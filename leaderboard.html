<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="">
  <meta name="description" content="Breakout — Global Leaderboard">
  <title>Breakout — Leaderboard</title>
  <link rel="stylesheet" href="style.css">
  <style>
    .lb-wrapper {
      padding: 60px 0;
    }

    .lb-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 32px;
      flex-wrap: wrap;
      gap: 16px;
    }

    .lb-empty {
      text-align: center;
      padding: 80px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }

    .lb-empty-icon {
      font-size: 48px;
      margin-bottom: 16px;
      opacity: 0.5;
    }

    .player-name {
      color: var(--text-primary);
      font-weight: 600;
    }

    .player-score {
      font-family: var(--font-display);
      font-size: 12px;
      color: var(--neon-yellow);
    }

    .player-date {
      color: var(--text-muted);
      font-size: 12px;
    }

    .your-row {
      outline: 1px solid rgba(0, 240, 255, 0.2);
      background: rgba(0, 240, 255, 0.04) !important;
    }
  </style>
</head>
<body>

  <!-- NAV -->
  <nav>
    <a href="index.html" class="nav-logo">BREAKOUT</a>
    <ul class="nav-links">
      <li><a href="index.html">Home</a></li>
      <li><a href="game.html">Play</a></li>
      <li><a href="leaderboard.html" class="active">Leaderboard</a></li>
      <li><a href="login.html" id="nav-auth-link">Login</a></li>
    </ul>
  </nav>

  <div class="container lb-wrapper">
    <div class="lb-header fade-in">
      <h2 class="section-title" style="margin-bottom:0;">// Leaderboard</h2>
      <a href="game.html" class="btn btn-primary btn-small">▶ Play</a>
    </div>

    <div class="card fade-in fade-in-delay-1" id="lbCard">
      <div class="lb-empty" id="lbEmpty">
        <div class="lb-empty-icon">🏆</div>
        <p>No scores yet. Be the first to play!</p>
      </div>
      <table class="lb-table" id="lbTable" style="display:none;">
        <thead>
          <tr>
            <th>Rank</th>
            <th>Player</th>
            <th>Score</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody id="lbBody"></tbody>
      </table>
    </div>
  </div>

  <footer>
    <p>Leaderboard · Breakout 2026</p>
  </footer>

  <script>
    const currentUser = JSON.parse(localStorage.getItem('breakout_user') || 'null');

    // Update nav
    if (currentUser) {
      const link = document.getElementById('nav-auth-link');
      link.textContent = currentUser.username;
      link.href = '#';
    }

    // Load leaderboard
    function loadLeaderboard() {
      // Try PHP backend first
      fetch('php/leaderboard.php')
        .then(r => r.json())
        .then(data => renderLeaderboard(data))
        .catch(() => {
          // Fallback to localStorage
          const lb = JSON.parse(localStorage.getItem('breakout_leaderboard') || '[]');
          renderLeaderboard(lb);
        });
    }

    function renderLeaderboard(data) {
      const tbody = document.getElementById('lbBody');
      const table = document.getElementById('lbTable');
      const empty = document.getElementById('lbEmpty');

      if (!data || data.length === 0) {
        table.style.display = 'none';
        empty.style.display = 'block';
        return;
      }

      table.style.display = 'table';
      empty.style.display = 'none';
      tbody.innerHTML = '';

      data.slice(0, 20).forEach((entry, i) => {
        const rank = i + 1;
        let rankClass = '';
        let rankLabel = `#${rank}`;
        if (rank === 1) { rankClass = 'rank-gold'; rankLabel = '🥇'; }
        else if (rank === 2) { rankClass = 'rank-silver'; rankLabel = '🥈'; }
        else if (rank === 3) { rankClass = 'rank-bronze'; rankLabel = '🥉'; }

        const isYou = currentUser && entry.username === currentUser.username;

        const tr = document.createElement('tr');
        if (isYou) tr.className = 'your-row';
        tr.innerHTML = `
          <td class="${rankClass}">${rankLabel}</td>
          <td class="player-name">${entry.username}${isYou ? ' (you)' : ''}</td>
          <td class="player-score">${entry.score}</td>
          <td class="player-date">${entry.date || '—'}</td>
        `;
        tbody.appendChild(tr);
      });
    }

    loadLeaderboard();
  </script>
</body>
</html>
